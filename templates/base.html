<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvoiceHound 🐕 {% block title %}{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme (gradient + glass) ───────────────────────────────────── */
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      color: #e2e8f0;
      min-height: 100vh;
      background:
        radial-gradient(900px 500px at 15% 8%, rgba(168, 85, 247, .35), transparent 55%),
        radial-gradient(900px 520px at 85% 12%, rgba(59, 130, 246, .28), transparent 55%),
        radial-gradient(900px 520px at 45% 92%, rgba(34, 197, 94, .18), transparent 55%),
        linear-gradient(180deg, #0b1020 0%, #070b16 100%);
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 26px 18px 46px;
    }

    /* ── Navbar (pill) ─────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }
    .nav-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, .22);
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0, 0, 0, .35);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
      color: #e2e8f0;
      letter-spacing: .2px;
    }
    .brand .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .18);
    }
    .nav-link {
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      color: rgba(226, 232, 240, .72);
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid transparent;
      transition: background .15s, border-color .15s, color .15s;
    }
    .nav-link:hover {
      color: #e2e8f0;
      background: rgba(148, 163, 184, .10);
      border-color: rgba(148, 163, 184, .18);
    }
    .nav-link.active {
      color: #0b1020;
      background: linear-gradient(135deg, rgba(168, 85, 247, .95), rgba(59, 130, 246, .95));
      border-color: rgba(255, 255, 255, .25);
    }

    .container { padding: 0; }
    h1 { font-size: 28px; margin-bottom: 6px; }
    h2 { font-size: 20px; margin-bottom: 14px; color: #cbd5e1; }
    .card {
      background: rgba(15, 23, 42, .65);
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
    }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; margin-top: 14px; }
    input, select, textarea {
      width: 100%; padding: 9px 12px; background: #0f172a; border: 1px solid #334155;
      border-radius: 7px; color: #e2e8f0; font-size: 14px; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: #22c55e; }
    /* ── Buttons (match theme) ───────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      border: 1px solid rgba(148, 163, 184, .18);
      text-decoration: none;
      color: #e2e8f0;
      background: rgba(15, 23, 42, .55);
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, .25);
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.03); box-shadow: 0 16px 40px rgba(0,0,0,.32); }
    .btn:active { transform: translateY(0px) scale(.99); }

    .btn-gray   { background: rgba(30, 41, 59, .65); border-color: rgba(148,163,184,.18); }
    .btn-blue   { background: linear-gradient(135deg, rgba(59,130,246,.95), rgba(99,102,241,.95)); border-color: rgba(255,255,255,.18); }
    .btn-green  { background: linear-gradient(135deg, rgba(34,197,94,.95), rgba(16,185,129,.95)); border-color: rgba(255,255,255,.18); color: #042f1a; }
    .btn-yellow { background: linear-gradient(135deg, rgba(245,158,11,.95), rgba(251,191,36,.95)); border-color: rgba(255,255,255,.18); color: #1f1303; }
    .btn-red    { background: linear-gradient(135deg, rgba(239,68,68,.95), rgba(244,63,94,.95)); border-color: rgba(255,255,255,.18); }
    .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .tag-unpaid  { background: #fef9c3; color: #92400e; }
    .tag-paid    { background: #dcfce7; color: #15803d; }
    .tag-overdue { background: #fee2e2; color: #991b1b; }
    .flash { padding: 12px 18px; border-radius: 8px; margin-bottom: 18px; font-size: 14px; }
    .flash-ok  { background: #14532d; color: #bbf7d0; border: 1px solid #22c55e; }
    .flash-err { background: #450a0a; color: #fca5a5; border: 1px solid #ef4444; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .row-group { border: 1px solid #334155; border-radius: 8px; padding: 14px; margin-top: 10px; background: #0f172a; }
    .add-row-btn { margin-top: 10px; background: none; border: 1px dashed #475569; color: #94a3b8;
                   padding: 7px 14px; border-radius: 7px; cursor: pointer; font-size: 13px; width: 100%; }
    .add-row-btn:hover { border-color: #22c55e; color: #22c55e; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { padding: 10px 12px; text-align: left; background: #0f172a; color: #94a3b8; font-size: 12px; text-transform: uppercase; }
    td { padding: 10px 12px; border-bottom: 1px solid #1e293b; }
    .mono { font-family: monospace; font-size: 13px; }
  </style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <nav class="nav-pill">
      <a href="/invoice" class="brand"><span class="dot"></span> InvoiceHound</a>
      <a href="/invoice" class="nav-link {% if request.path.startswith('/invoice') or request.path == '/' %}active{% endif %}">New Invoice</a>
      <a href="/dashboard" class="nav-link {% if request.path.startswith('/dashboard') %}active{% endif %}">Dashboard</a>
      <a href="/messages" class="nav-link {% if request.path.startswith('/messages') %}active{% endif %}">Messages</a>
    </nav>
  </div>

  <div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash flash-{{ 'ok' if cat == 'success' else 'err' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</div>
</body>
</html>
